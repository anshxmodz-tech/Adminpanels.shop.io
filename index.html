<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ULTRA HUB | THE CORE ACCESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap');
        body { font-family: 'Urbanist', sans-serif; background: #020617; color: white; }
        .hero-gradient { background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent); }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden-panel { display: none; }
    </style>
</head>
<body class="min-h-screen hero-gradient">

    <section id="auth-section" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass p-10 rounded-[40px] w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-blue-500 italic">ULTRA<span class="text-white">HUB</span></h1>
                <p class="text-slate-500 text-sm font-bold mt-2">ELITE USER ACCESS</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="w-full bg-slate-950 border border-slate-800 p-5 rounded-2xl focus:border-blue-500 outline-none transition">
                <input type="password" id="password" placeholder="Password" class="w-full bg-slate-950 border border-slate-800 p-5 rounded-2xl focus:border-blue-500 outline-none transition">
                <div class="flex gap-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-blue-600 p-5 rounded-2xl font-bold hover:bg-blue-700 transition">LOGIN</button>
                    <button onclick="handleAuth('register')" class="flex-1 bg-slate-800 p-5 rounded-2xl font-bold hover:bg-slate-700 transition">SIGNUP</button>
                </div>
            </div>
        </div>
    </section>

    <section id="user-dashboard" class="hidden-panel p-6 md:p-12 max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-4xl font-black tracking-tighter">DASHBOARD</h2>
            <button onclick="firebase.auth().signOut()" class="bg-red-600/10 text-red-500 border border-red-500/20 px-6 py-3 rounded-xl font-bold hover:bg-red-600 hover:text-white transition text-xs">LOGOUT SESSION</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="glass p-10 rounded-[40px] border-l-8 border-blue-600">
                <p class="text-slate-500 text-xs font-bold uppercase mb-2 tracking-widest">Your Private UID</p>
                <p id="userUid" class="font-mono text-sm text-blue-400 break-all">---</p>
                <button onclick="navigator.clipboard.writeText(document.getElementById('userUid').innerText)" class="mt-4 text-[10px] text-slate-500 hover:text-white"><i class="fa-solid fa-copy"></i> COPY UID</button>
            </div>
            <div class="glass p-10 rounded-[40px] border-l-8 border-green-600">
                <p class="text-slate-500 text-xs font-bold uppercase mb-2 tracking-widest">Account Status</p>
                <h3 id="accStatus" class="text-3xl font-black text-green-500 uppercase">Checking...</h3>
            </div>
        </div>

        <div class="glass p-10 rounded-[40px]">
            <h3 class="text-xl font-bold mb-6 italic"><i class="fa-solid fa-rocket mr-3 text-blue-500"></i> Active Core Features</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-slate-900 p-6 rounded-2xl text-center border border-white/5"><p class="text-[10px] text-slate-500 font-bold mb-1">BYPASS</p><p class="text-green-500 font-black">ACTIVE</p></div>
                <div class="bg-slate-900 p-6 rounded-2xl text-center border border-white/5"><p class="text-[10px] text-slate-500 font-bold mb-1">ANTIBAN</p><p class="text-green-500 font-black">ACTIVE</p></div>
            </div>
        </div>
    </section>

    <script>
        // --- PRE-FILLED CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyDoZtOO0NeC8WvNT_L21WxyYCQRtry0xsQ",
          authDomain: "panel-8c81c.firebaseapp.com",
          databaseURL: "https://panel-8c81c-default-rtdb.firebaseio.com",
          projectId: "panel-8c81c",
          storageBucket: "panel-8c81c.firebasestorage.app",
          messagingSenderId: "613780620355",
          appId: "1:613780620355:web:f06f434d272239823e80f6",
          measurementId: "G-WDHC1NNH8G"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Fill all fields!");

            if(type === 'register') {
                auth.createUserWithEmailAndPassword(email, pass).then(res => {
                    db.ref('users/' + res.user.uid).set({ email: email, accountStatus: 'active', role: 'user' });
                }).catch(e => alert(e.message));
            } else {
                auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-section').classList.add('hidden-panel');
                document.getElementById('user-dashboard').classList.remove('hidden-panel');
                document.getElementById('userUid').innerText = user.uid;

                db.ref('users/' + user.uid + '/accountStatus').on('value', snap => {
                    const s = snap.val();
                    const el = document.getElementById('accStatus');
                    el.innerText = s;
                    if(s === 'banned') {
                        el.className = "text-3xl font-black text-red-500 uppercase";
                        alert("🔴 YOUR ACCOUNT HAS BEEN BANNED!");
                    } else {
                        el.className = "text-3xl font-black text-green-500 uppercase";
                    }
                });
            } else {
                document.getElementById('auth-section').classList.remove('hidden-panel');
                document.getElementById('user-dashboard').classList.add('hidden-panel');
            }
        });
    </script>
</body>
</html>
